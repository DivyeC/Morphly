name: Render Manim Video

on:
  workflow_dispatch:
    inputs:
      source_file:
        description: "Manim script"
        required: true
      scene_names:
        default: "Main"

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Render Manim
      id: renderer
      uses: pavelzw/manim_community_renderer@master
      with:
        source_file: ${{ inputs.source_file }}
        scene_names: ${{ inputs.scene_names }}
        args: "-ql"

    - name: Upload artifact (optional)
      uses: actions/upload-artifact@v4
      with:
        name: manim-mp4
        path: ${{ steps.renderer.outputs.video_path }}

    # ✅ Move + keep only 3 videos
    - name: Store video and keep last 3
      run: |
        mkdir -p public/videos

        VIDEO_PATH="${{ steps.renderer.outputs.video_path }}"
        NEW_NAME="video-$(date +%s).mp4"

        cp "$VIDEO_PATH" "public/videos/$NEW_NAME"

        cd public/videos

        # Keep only latest 3
        ls -t *.mp4 | tail -n +4 | xargs -r rm --

    # ✅ Commit to repo (VERY IMPORTANT)
    - name: Commit and push videos
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add public/videos
        git commit -m "Update videos" || echo "No changes"
        git push
