name: Render Manim Video

on:
  workflow_dispatch:
    inputs:
      source_file:
        required: true
      scene_names:
        default: "Main"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Render Manim
        id: renderer
        uses: pavelzw/manim_community_renderer@master
        with:
          source_file: ${{ inputs.source_file }}
          scene_names: ${{ inputs.scene_names }}
          args: "-ql"

      - name: Copy rendered video
        run: |
          mkdir -p public/videos

          echo "Video path: ${{ steps.renderer.outputs.video_path }}"

          cp "${{ steps.renderer.outputs.video_path }}" public/videos/latest.mp4
          cp "${{ steps.renderer.outputs.video_path }}" public/videos/video-$(date +%s).mp4
      
      - name: Keep only last 3 videos
        run: |
          cd public/videos
          ls -t *.mp4 2>/dev/null | tail -n +4 | xargs -r rm --

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
